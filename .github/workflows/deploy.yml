# .github/workflows/deploy.yml
name: CI/CD to EC2 (No Docker)

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Set Node.js version
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV

      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Server JAR
        working-directory: ./Server
        run: mvn clean package -DskipTests

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.SERVER_EC2_SSH_KEY }}
          source: "./Server/target/Server-1.0-SNAPSHOT.jar"
          target: "/home/ec2-user/chatflow/"
          strip_components: 1

      - name: Deploy to Server EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.SERVER_EC2_SSH_KEY }}
          script: |
            # 停止旧进程（如果还在运行）
            pkill -f "java.*chatflow-server" || true
            
            # 创建目录
            mkdir -p /home/ec2-user/chatflow
            
            # 启动应用
            cd /home/ec2-user/chatflow
            export KAFKA_BOOTSTRAP_SERVERS=13.220.177.87:9092
            nohup java -jar Server-1.0-SNAPSHOT.jar \
              --server.port=8080 \
              > app.log 2>&1 &
            
            echo "Server started"

