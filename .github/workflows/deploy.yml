# .github/workflows/deploy.yml
name: CI/CD to EC2 (No Docker)

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Set Node.js version
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV

      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Server JAR
        working-directory: ./Server
        run: mvn clean package -DskipTests

      - name: Deploy to Server EC2
        uses: appleboy/ssh-action@v0.1.0
        with:
          host: ${{ secrets.SERVER_EC2_HOST }}
          username: ${{ secrets.SERVER_EC2_USER }}
          key: ${{ secrets.SERVER_EC2_SSH_KEY }}
          script: |
            # 创建目录
            mkdir -p /home/${{ secrets.SERVER_EC2_USER }}/chatflow
            
            # 停止旧进程（如果还在运行）
            pkill -f "java.*chatflow-server" || true
            
            # 复制新 jar 包
            scp -o StrictHostKeyChecking=no ./Server/target/chatflow-server-1.0-SNAPSHOT.jar ${{ secrets.SERVER_EC2_USER }}@${{ secrets.SERVER_EC2_HOST }}:/home/${{ secrets.SERVER_EC2_USER }}/chatflow/
            
            # 启动应用
            cd /home/${{ secrets.SERVER_EC2_USER }}/chatflow
            export KAFKA_BOOTSTRAP_SERVERS=13.220.177.87:9092
            nohup java -jar chatflow-server-1.0-SNAPSHOT.jar \
              --server.port=8080 \
              > app.log 2>&1 &
            
            echo "Server started"
