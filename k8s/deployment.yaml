# k8s/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatflow-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chatflow-server
  template:
    metadata:
      labels:
        app: chatflow-server
    spec:
      containers:
        - name: chatflow-server
          image: yourname/chatflow-server:latest
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-service:9092"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5